<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Word Combo — Klaviatura kombinatsiyalari testi</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

  --bg:            #FAF7F2;   
  --bg-soft:       #FFF8EF;   
  --surface:       #FFFFFF;   
  --ink:           #2D2A4A;   
  --ink-soft:      #6B6680;   
  --primary:       #6C63FF;   
  --primary-soft:  #EDEBFF;   
  --primary-dark:  #5147E0;
  --accent-2:      #FFB199;   
  --success:       #6FCF97;   
  --success-bg:    #E6F7EC;
  --error:         #FF8A80;   
  --error-bg:      #FFEDEA;
  --skin:          #FFD9B3;   
  --hair:          #4A4063;   
  --shadow-sm:      0 2px 8px rgba(45,42,74,0.06);
  --shadow-md:      0 8px 24px rgba(45,42,74,0.10);
  --shadow-lg:      0 16px 40px rgba(45,42,74,0.14);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --font-display: 'Manrope', sans-serif;
  --font-body: 'Inter', sans-serif;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html, body{ height:100%; }
body{
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button{ font-family: inherit; cursor:pointer; border:none; background:none; color:inherit; }
ul{ list-style:none; }
img,svg{ display:block; max-width:100%; }
:focus-visible{ outline: 3px solid var(--primary); outline-offset: 2px; border-radius: 6px; }

.bg-decor{
  position: fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none;
}
.bg-decor span{
  position:absolute; border-radius:50%; opacity:0.35; filter: blur(40px);
}
.bg-decor span:nth-child(1){ width:340px; height:340px; background:var(--primary-soft); top:-100px; right:-80px; }
.bg-decor span:nth-child(2){ width:260px; height:260px; background:#FFE8DA; bottom:10%; left:-100px; }
.bg-decor span:nth-child(3){ width:200px; height:200px; background:var(--success-bg); bottom:-60px; right:10%; }

.topbar{
  position: sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 18px;
  background: rgba(250,247,242,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(45,42,74,0.06);
}
.brand{
  display:flex; align-items:center; gap:10px;
  font-family: var(--font-display); font-weight:800; font-size:1.05rem; color:var(--ink);
}
.brand-mark{
  width:36px; height:36px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary), #8B7FFF);
  display:flex; align-items:center; justify-content:center;
  color:white; font-size:1.1rem; box-shadow: var(--shadow-sm);
}
.burger-btn{
  width:44px; height:44px; border-radius: var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  background: var(--surface); box-shadow: var(--shadow-sm);
  font-size: 1.35rem; color: var(--ink);
  transition: transform .15s ease, box-shadow .15s ease;
}
.burger-btn:active{ transform: scale(0.92); }

.menu-overlay{
  position: fixed; inset:0; background: rgba(45,42,74,0.35);
  opacity:0; visibility:hidden; transition: opacity .25s ease, visibility .25s ease;
  z-index: 200;
}
.menu-overlay.open{ opacity:1; visibility:visible; }

.menu-panel{
  position: fixed; top:0; right:0; height:100%; width: min(340px, 86vw);
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  z-index: 201;
  transform: translateX(100%);
  transition: transform .32s cubic-bezier(.16,1,.3,1);
  display:flex; flex-direction:column;
  padding: 20px 18px 28px;
}
.menu-panel.open{ transform: translateX(0); }

.menu-head{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom: 18px;
}
.menu-head .brand{ font-size:1rem; }
.menu-close{
  width:38px; height:38px; border-radius:10px; background: var(--bg-soft);
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
}

.menu-nav{ display:flex; flex-direction:column; gap:6px; margin-bottom: auto; }
.menu-link{
  display:flex; align-items:center; gap:14px;
  padding: 13px 14px; border-radius: var(--radius-sm);
  font-weight:600; font-size:0.98rem; color: var(--ink);
  transition: background .15s ease;
}
.menu-link i, .menu-link .menu-icon-svg{ font-size:1.25rem; color: var(--primary); width:24px; flex-shrink:0; text-align:center; }
.menu-link:hover, .menu-link.active{ background: var(--primary-soft); }

.menu-divider{ height:1px; background: rgba(45,42,74,0.08); margin: 16px 0; }

.lang-section-title{
  font-size:0.78rem; text-transform: uppercase; letter-spacing:0.06em;
  color: var(--ink-soft); font-weight:700; margin-bottom:10px; padding-left:4px;
}
.lang-options{ display:flex; flex-direction:column; gap:8px; }
.lang-btn{
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--bg-soft); font-weight:600; font-size:0.95rem;
  border: 2px solid transparent;
  transition: all .15s ease;
}
.lang-btn .lang-name{ display:flex; align-items:center; gap:10px; }
.lang-btn .flag-dot{
  width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:0.85rem; font-weight:800; color: var(--primary); background: var(--primary-soft);
}
.lang-btn.active{ border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
.lang-btn.active .check-icon{ opacity:1; }
.lang-btn .check-icon{ opacity:0; color: var(--primary); font-size:1.1rem; }

.page{ display:none; padding: 0 18px 60px; max-width: 720px; margin: 0 auto; }
.page.active{ display:block; animation: fadeUp .4s ease; }
@keyframes fadeUp{ from{ opacity:0; transform: translateY(10px);} to{opacity:1; transform:translateY(0);} }

.hero{
  padding: 28px 0 8px; text-align:center;
}
.hero-illustration{ width: 220px; margin: 0 auto 18px; }
.hero h1{
  font-family: var(--font-display); font-weight:800; font-size:1.65rem; line-height:1.25;
  white-space: pre-line; margin-bottom:10px; letter-spacing:-0.01em;
}
.hero p.subtitle{ color: var(--ink-soft); font-size:0.96rem; line-height:1.55; max-width:480px; margin:0 auto 22px; }

.hero-stats{ display:flex; justify-content:center; gap:14px; margin-bottom:24px; }
.stat-pill{
  background: var(--surface); border-radius: var(--radius-md); padding: 14px 22px;
  box-shadow: var(--shadow-sm); min-width:96px;
}
.stat-pill .num{ font-family: var(--font-display); font-weight:800; font-size:1.5rem; color: var(--primary); }
.stat-pill .lbl{ font-size:0.76rem; color: var(--ink-soft); font-weight:600; }

.btn-primary{
  display:inline-flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color:white; font-weight:700; font-size:1rem;
  padding: 15px 30px; border-radius: 999px;
  box-shadow: 0 10px 24px rgba(108,99,255,0.35);
  transition: transform .15s ease, box-shadow .15s ease;
}
.btn-primary:active{ transform: scale(0.96); }
.btn-primary i{ font-size:1.2rem; }

.btn-secondary{
  display:inline-flex; align-items:center; gap:8px;
  background: var(--surface); color: var(--ink); font-weight:700; font-size:0.95rem;
  padding: 13px 26px; border-radius: 999px; box-shadow: var(--shadow-sm);
  transition: transform .15s ease;
}
.btn-secondary:active{ transform: scale(0.96); }

.sections-head{ margin: 34px 0 16px; text-align:left; }
.sections-head h2{ font-family: var(--font-display); font-weight:800; font-size:1.2rem; margin-bottom:4px; }
.sections-head p{ color: var(--ink-soft); font-size:0.88rem; }

.section-card{
  display:flex; align-items:center; gap:14px;
  background: var(--surface); border-radius: var(--radius-md);
  padding: 16px; margin-bottom:12px; box-shadow: var(--shadow-sm);
}
.section-card .icon-wrap{
  width:50px; height:50px; border-radius: 14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:white;
}
.section-card .info{ flex:1; }
.section-card .info h3{ font-size:0.96rem; font-weight:700; margin-bottom:2px; }
.section-card .info p{ font-size:0.8rem; color: var(--ink-soft); }
.section-card .count-badge{
  font-size:0.72rem; font-weight:700; color: var(--primary);
  background: var(--primary-soft); padding:4px 10px; border-radius:999px; white-space:nowrap;
}

.quiz-intro-illustration{ width:180px; margin: 10px auto 16px; }
.quiz-rules{ background: var(--surface); border-radius: var(--radius-md); padding:18px; margin: 20px 0 26px; box-shadow: var(--shadow-sm); }
.quiz-rule{ display:flex; gap:12px; align-items:flex-start; padding:10px 0; }
.quiz-rule:not(:last-child){ border-bottom: 1px solid rgba(45,42,74,0.06); }
.quiz-rule i{ color: var(--primary); font-size:1.2rem; margin-top:1px; }
.quiz-rule span{ font-size:0.9rem; line-height:1.45; color: var(--ink); }

.quiz-start-wrap{ text-align:center; padding: 6px 0 20px; }

.quiz-runner{ padding-top: 8px; }
.progress-wrap{ margin-bottom:18px; }
.progress-meta{ display:flex; justify-content:space-between; font-size:0.78rem; color: var(--ink-soft); font-weight:600; margin-bottom:7px; }
.progress-bar-track{ height:8px; border-radius:999px; background: var(--bg-soft); overflow:hidden; }
.progress-bar-fill{ height:100%; background: linear-gradient(90deg, var(--primary), #8B7FFF); border-radius:999px; transition: width .4s cubic-bezier(.16,1,.3,1); }

.section-tag{
  display:inline-flex; align-items:center; gap:6px;
  background: var(--primary-soft); color: var(--primary-dark);
  font-size:0.75rem; font-weight:700; padding:5px 12px; border-radius:999px; margin-bottom:14px;
}

.question-card{
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 22px 20px; box-shadow: var(--shadow-md); margin-bottom:18px;
}
.combo-illustration{ width:130px; margin: 0 auto 14px; }
.question-text{ font-family: var(--font-display); font-weight:700; font-size:1.08rem; line-height:1.4; text-align:center; margin-bottom: 4px; }

.options-list{ display:flex; flex-direction:column; gap:10px; margin-top:18px; }
.option-btn{
  display:flex; align-items:center; gap:12px;
  text-align:left; width:100%;
  background: var(--bg-soft); border-radius: var(--radius-sm);
  padding: 14px 16px; font-size:0.93rem; font-weight:600; color: var(--ink);
  border: 2px solid transparent;
  transition: all .15s ease;
}
.option-btn .opt-letter{
  width:26px; height:26px; border-radius:50%; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:800;
  color: var(--ink-soft); flex-shrink:0; box-shadow: 0 1px 3px rgba(45,42,74,0.1);
}
.option-btn:active{ transform: scale(0.985); }
.option-btn.selected{ border-color: var(--primary); background: var(--primary-soft); }
.option-btn.selected .opt-letter{ background:var(--primary); color:white; }

.option-btn.correct-reveal{ border-color: var(--success); background: var(--success-bg); }
.option-btn.correct-reveal .opt-letter{ background:var(--success); color:white; }
.option-btn.wrong-reveal{ border-color: var(--error); background: var(--error-bg); }
.option-btn.wrong-reveal .opt-letter{ background:var(--error); color:white; }
.option-btn.dimmed{ opacity:0.45; }
.option-btn.locked{ pointer-events:none; }

.feedback-banner{
  display:flex; align-items:center; gap:10px;
  padding: 13px 16px; border-radius: var(--radius-sm); margin-top:16px;
  font-weight:700; font-size:0.92rem;
  opacity:0; max-height:0; overflow:hidden; transition: all .3s ease;
}
.feedback-banner.show{ opacity:1; max-height:80px; padding:13px 16px; }
.feedback-banner.correct{ background: var(--success-bg); color:#2E7D4F; }
.feedback-banner.wrong{ background: var(--error-bg); color:#C0392B; }
.feedback-banner i{ font-size:1.3rem; }

.quiz-actions{ display:flex; flex-direction:column; gap:10px; }
.btn-check, .btn-continue{
  width:100%; padding:15px; border-radius: var(--radius-sm); font-weight:700; font-size:0.98rem;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-check{ background: var(--primary); color:white; box-shadow: 0 8px 20px rgba(108,99,255,0.3); }
.btn-check:disabled{ background: #DAD6F5; color:#A39FE0; box-shadow:none; pointer-events:none; }
.btn-continue{ background: var(--ink); color:white; box-shadow: 0 8px 20px rgba(45,42,74,0.25); }
.btn-continue:disabled{ background:#E4E2EC; color:#A8A5BC; box-shadow:none; pointer-events:none; }

.result-wrap{ text-align:center; padding: 30px 0; }
.result-illustration{ width:200px; margin:0 auto 18px; }
.result-wrap h2{ font-family: var(--font-display); font-weight:800; font-size:1.4rem; margin-bottom:8px; }
.result-wrap p.desc{ color: var(--ink-soft); font-size:0.92rem; margin-bottom: 26px; }
.result-stats{ display:flex; gap:14px; justify-content:center; margin-bottom:28px; }
.result-stat{ flex:1; max-width:150px; background:var(--surface); border-radius: var(--radius-md); padding:18px 10px; box-shadow: var(--shadow-sm); }
.result-stat .icon{ font-size:1.6rem; margin-bottom:6px; }
.result-stat.correct .icon{ color: var(--success); }
.result-stat.wrong .icon{ color: var(--error); }
.result-stat .num{ font-family: var(--font-display); font-weight:800; font-size:1.6rem; }
.result-stat .lbl{ font-size:0.76rem; color: var(--ink-soft); font-weight:600; }
.result-actions{ display:flex; flex-direction:column; gap:12px; align-items:center; }

@media (min-width:600px){
  .page{ padding-top:10px; }
  .hero h1{ font-size:2rem; }
}

@media (min-width:900px){
  body{ overflow-x:visible; }
  .topbar{ padding: 18px 48px; }
  .brand{ font-size:1.2rem; }
  .brand-mark{ width:42px; height:42px; font-size:1.3rem; }
  .burger-btn{ width:48px; height:48px; font-size:1.5rem; }

  .page{ max-width: 1080px; padding: 0 48px 70px; }
  .page.active{ display:block; }

  .hero{ padding: 48px 0 16px; display:grid; grid-template-columns: 1fr 320px; align-items:center; gap:40px; text-align:left; }
  .hero-illustration{ width: 280px; margin:0; grid-column:2; grid-row:1 / span 4; }
  .hero h1{ font-size:2.5rem; }
  .hero p.subtitle{ margin:0 0 22px; max-width:520px; }
  .hero-stats{ justify-content:flex-start; }
  .hero .btn-primary{ align-self:flex-start; }

  .sections-head{ margin: 48px 0 20px; }
  .sections-head h2{ font-size:1.5rem; }
  .sections-head p{ font-size:1rem; }
  #sectionCardsSlot{ display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
  .section-card{ margin-bottom:0; padding:20px; }

  .quiz-intro-illustration{ width:240px; }
  .quiz-rules{ max-width:560px; margin:0 auto; }
  .quiz-start-wrap{ display:flex; justify-content:center; }

  .quiz-runner{ max-width:640px; margin:0 auto; }

  .result-wrap{ max-width:560px; margin:0 auto; padding:50px 0; }
  .result-illustration{ width:240px; }

  .menu-panel{ width: 380px; }
}

@media (min-width:900px){
  .bg-decor span:nth-child(1){ width:480px; height:480px; }
  .bg-decor span:nth-child(2){ width:380px; height:380px; }
  .bg-decor span:nth-child(3){ width:320px; height:320px; }
}

@media (min-width:1280px){
  .page{ max-width: 1280px; padding: 0 64px 80px; }
  #sectionCardsSlot{ grid-template-columns: repeat(3, 1fr); }
  .hero{ grid-template-columns: 1fr 380px; }
  .hero-illustration{ width: 340px; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
}
</style>
</head>
<body>


<div class="bg-decor" aria-hidden="true"><span></span><span></span><span></span></div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark"><i class="ph-bold ph-keyboard"></i></div>
    <span data-i18n="appName">Word Combo</span>
  </div>
  <button class="burger-btn" id="burgerBtn" aria-label="Menu" aria-expanded="false">
    <i class="ph-bold ph-list"></i>
  </button>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<nav class="menu-panel" id="menuPanel" aria-label="Main menu">
  <div class="menu-head">
    <div class="brand"><div class="brand-mark"><i class="ph-bold ph-keyboard"></i></div><span data-i18n="appName">Word Combo</span></div>
    <button class="menu-close" id="menuCloseBtn" aria-label="Close menu"><i class="ph-bold ph-x"></i></button>
  </div>

  <div class="menu-nav">
    <button class="menu-link active" data-nav="home">
      <svg class="menu-icon-svg" viewBox="0 0 256 256" width="22" height="22" fill="currentColor"><path d="M218.83,103.77l-80-75.48a20,20,0,0,0-21.66,0l-80,75.48A20,20,0,0,0,32,118.43V208a20,20,0,0,0,20,20H100a12,12,0,0,0,12-12V165.33a16,16,0,0,1,32,0V216a12,12,0,0,0,12,12h48a20,20,0,0,0,20-20V118.43A20,20,0,0,0,218.83,103.77Z"></path></svg><span data-i18n="menuHome">Bosh sahifa</span>
    </button>
    <button class="menu-link" data-nav="quiz-intro">
      <svg class="menu-icon-svg" viewBox="0 0 256 256" width="22" height="22" fill="currentColor"><path d="M140,180a12,12,0,1,1-12-12A12,12,0,0,1,140,180ZM128,72c-22.06,0-40,16.15-40,36v4a12,12,0,0,0,24,0v-4c0-6.62,7.4-12,16-12s16,5.38,16,12-7.4,12-16,12a12,12,0,0,0-12,12v8a12,12,0,0,0,24,0v-1.39c14.06-4.36,24-16.43,24-30.61C168,88.15,150.06,72,128,72Zm104,16A104,104,0,0,1,79.12,179.74L45.07,219.31l0,.06A16,16,0,0,1,16,210.67V208a8,8,0,0,1,.13-1.43L24.6,166A104,104,0,1,1,232,88Z"></path></svg><span data-i18n="menuQuiz">Savollar va javoblar</span>
    </button>
  </div>

  <div class="menu-divider"></div>

  <div class="lang-block">
    <div class="lang-section-title" data-i18n="menuLang">Til</div>
    <div class="lang-options" id="langOptions">
      <button class="lang-btn" data-lang="uz">
        <span class="lang-name"><span class="flag-dot"><svg viewBox="0 0 256 256" width="14" height="14" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm88,104a87.61,87.61,0,0,1-3.33,24H174.16a151.26,151.26,0,0,0,0-48h38.51A87.61,87.61,0,0,1,216,128ZM98.5,168h59a103.4,103.4,0,0,1-29.5,46A103.4,103.4,0,0,1,98.5,168Zm-3.66-16a135.31,135.31,0,0,1,0-48h66.32a135.31,135.31,0,0,1,0,48ZM40,128a87.61,87.61,0,0,1,3.33-24H81.84a151.26,151.26,0,0,0,0,48H43.33A87.61,87.61,0,0,1,40,128Zm88.5-104.34A103.4,103.4,0,0,1,158,70H99A103.4,103.4,0,0,1,128.5,23.66ZM98.5,88a103.4,103.4,0,0,1,29.5-46,103.4,103.4,0,0,1,29.5,46Zm77.66,40h38.51a87.42,87.42,0,0,1,0,0Z"></path></svg></span> O'zbekcha</span>
        <i class="ph-bold ph-check-circle check-icon"></i>

const SECTION_ICONS = {
  section1: { icon: "ph-bold ph-files",            bg: "linear-gradient(135deg,#6C63FF,#8B7FFF)" },
  section2: { icon: "ph-bold ph-text-aa",          bg: "linear-gradient(135deg,#FF8A80,#FFB199)" },
  section3: { icon: "ph-bold ph-pencil-simple",     bg: "linear-gradient(135deg,#6FCF97,#8FE3B0)" },
  section4: { icon: "ph-bold ph-text-align-center",bg: "linear-gradient(135deg,#FFC36F,#FFD9A0)" },
  section5: { icon: "ph-bold ph-compass",          bg: "linear-gradient(135deg,#6C9FFF,#8FC0FF)" }
};

(function(){
  "use strict";

  
  const state = {
    lang: "ru",              
    questions: [],           
    currentIndex: 0,
    correctCount: 0,
    wrongCount: 0,
    selectedOptionIndex: null,
    isChecked: false,
    optionOrder: []          
  };

  
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  const burgerBtn   = $("#burgerBtn");
  const menuOverlay = $("#menuOverlay");
  const menuPanel   = $("#menuPanel");
  const menuCloseBtn= $("#menuCloseBtn");

  
  function openMenu(){
    menuOverlay.classList.add("open");
    menuPanel.classList.add("open");
    burgerBtn.setAttribute("aria-expanded","true");
  }
  function closeMenu(){
    menuOverlay.classList.remove("open");
    menuPanel.classList.remove("open");
    burgerBtn.setAttribute("aria-expanded","false");
  }
  burgerBtn.addEventListener("click", openMenu);
  menuCloseBtn.addEventListener("click", closeMenu);
  menuOverlay.addEventListener("click", closeMenu);
  document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeMenu(); });

  
  function goToPage(pageId){
    $$(".page").forEach(p => p.classList.remove("active"));
    $(`#page-${pageId}`).classList.add("active");
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });

    $$(".menu-link").forEach(l => l.classList.remove("active"));
    const navMap = { home: "home", "quiz-intro": "quiz-intro", "quiz-runner": "quiz-intro", "result": "quiz-intro" };
    const activeLink = $(`.menu-link[data-nav="${navMap[pageId]}"]`);
    if(activeLink) activeLink.classList.add("active");
  }

  $$(".menu-link").forEach(link => {
    link.addEventListener("click", () => {
      const target = link.dataset.nav;
      closeMenu();
      goToPage(target);
    });
  });

  $("#heroStartBtn").addEventListener("click", () => goToPage("quiz-intro"));
  $("#startQuizBtn").addEventListener("click", startQuiz);
  $("#restartBtn").addEventListener("click", startQuiz);
  $("#backHomeBtn").addEventListener("click", () => goToPage("home"));

  
  function applyLanguage(lang){
    state.lang = lang;
    document.documentElement.setAttribute("lang", lang);
    const dict = I18N[lang];

    $$("[data-i18n]").forEach(el => {
      const key = el.dataset.i18n;
      if(dict[key] !== undefined){

        el.innerHTML = dict[key].replace(/\n/g, "<br>");
      }
    });

    $$(".lang-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));

    renderSectionCards();

    if($("#page-quiz-runner").classList.contains("active")){
      renderQuestion();
    }
  }

  $$(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      applyLanguage(btn.dataset.lang);
      closeMenu();
    });
  });

  
  $("#heroIllustrationSlot").innerHTML = ILLUSTRATIONS.hero;
  $("#quizIntroIllustrationSlot").innerHTML = ILLUSTRATIONS.quizIntro;

  function renderSectionCards(){
    const dict = I18N[state.lang];
    const sectionKeys = ["section1","section2","section3","section4","section5"];
    const nameKeys = ["sec1Name","sec2Name","sec3Name","sec4Name","sec5Name"];
    const slot = $("#sectionCardsSlot");
    slot.innerHTML = "";
    sectionKeys.forEach((key, i) => {
      const meta = SECTION_ICONS[key];
      const count = QUIZ_DATA[key].length;
      const card = document.createElement("div");
      card.className = "section-card";
      card.innerHTML = `
        <div class="icon-wrap" style="background:${meta.bg}"><i class="${meta.icon}"></i></div>
        <div class="info">
          <h3>${dict[nameKeys[i]]}</h3>
          <p>${count} ${dict.secCount}</p>
        </div>
      `;
      slot.appendChild(card);
    });
  }

  
  function shuffle(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  
  function buildQuestionSet(){
    const sectionKeys = ["section1","section2","section3","section4","section5"];
    let flat = [];
    sectionKeys.forEach(key => {
      const sectionQuestions = shuffle(QUIZ_DATA[key]).map(q => Object.assign({}, q, { sectionKey: key }));
      flat = flat.concat(sectionQuestions);
    });
    return flat;
  }

  function startQuiz(){
    state.questions = buildQuestionSet();
    state.currentIndex = 0;
    state.correctCount = 0;
    state.wrongCount = 0;
    goToPage("quiz-runner");
    renderQuestion();
  }

  function currentQuestion(){
    return state.questions[state.currentIndex];
  }

  function renderQuestion(){
    const dict = I18N[state.lang];
    const q = currentQuestion();
    state.selectedOptionIndex = null;
    state.isChecked = false;

    
    const total = state.questions.length;
    const idx1 = state.currentIndex + 1;
    $("#progressCounter").textContent = `${idx1} ${dict.ofLabel} ${total}`;
    $("#progressBarFill").style.width = `${(idx1/total)*100}%`;

    
    const nameKeys = { section1:"sec1Name", section2:"sec2Name", section3:"sec3Name", section4:"sec4Name", section5:"sec5Name" };
    $("#sectionTagText").textContent = dict[nameKeys[q.sectionKey]];

    
    $("#comboIllustrationSlot").innerHTML = ILLUSTRATIONS.comboKeyboard;

    
    $("#questionText").textContent = q.q[state.lang];

    
    const order = shuffle([0,1,2]);
    state.optionOrder = order;

    const optionsList = $("#optionsList");
    optionsList.innerHTML = "";
    const letters = ["A","B","C"];
    order.forEach((origIndex, displayIndex) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.dataset.origIndex = origIndex;
      btn.innerHTML = `<span class="opt-letter">${letters[displayIndex]}</span><span class="opt-text">${q.options[state.lang][origIndex]}</span>`;
      btn.addEventListener("click", () => selectOption(btn, origIndex));
      optionsList.appendChild(btn);
    });

    
    const banner = $("#feedbackBanner");
    banner.classList.remove("show","correct","wrong");
    $("#checkBtn").disabled = true;
    $("#continueBtn").disabled = true;

    
    const continueLabel = $("#continueBtn span");
    continueLabel.textContent = (idx1 === total) ? dict.finishBtn : dict.nextBtn;
  }

  function selectOption(btn, origIndex){
    if(state.isChecked) return; 
    $$(".option-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    state.selectedOptionIndex = origIndex;
    $("#checkBtn").disabled = false;
  }

  $("#checkBtn").addEventListener("click", () => {
    if(state.selectedOptionIndex === null || state.isChecked) return;
    const dict = I18N[state.lang];
    const q = currentQuestion();
    state.isChecked = true;

    const isCorrect = state.selectedOptionIndex === q.correct;
    if(isCorrect) state.correctCount++; else state.wrongCount++;

    $$(".option-btn").forEach(b => {
      b.classList.add("locked");
      const oi = Number(b.dataset.origIndex);
      if(oi === q.correct){
        b.classList.add("correct-reveal");
      } else if(oi === state.selectedOptionIndex){
        b.classList.add("wrong-reveal");
      } else {
        b.classList.add("dimmed");
      }
    });

    const banner = $("#feedbackBanner");
    const icon = banner.querySelector("i");
    const text = $("#feedbackText");
    if(isCorrect){
      banner.classList.add("show","correct");
      banner.classList.remove("wrong");
      icon.className = "ph-bold ph-check-circle";
      text.textContent = dict.correctMsg;
    } else {
      banner.classList.add("show","wrong");
      banner.classList.remove("correct");
      icon.className = "ph-bold ph-x-circle";
      text.textContent = `${dict.wrongMsg} ${dict.correctAnswerIs} ${q.options[state.lang][q.correct]}`;
    }

    $("#checkBtn").disabled = true;
    $("#continueBtn").disabled = false;
  });

  $("#continueBtn").addEventListener("click", () => {
    if($("#continueBtn").disabled) return;
    if(state.currentIndex < state.questions.length - 1){
      state.currentIndex++;
      renderQuestion();
    } else {
      showResult();
    }
  });

  function showResult(){
    const dict = I18N[state.lang];
    $("#resultCorrectNum").textContent = state.correctCount;
    $("#resultWrongNum").textContent = state.wrongCount;

    const ratio = state.correctCount / state.questions.length;
    $("#resultIllustrationSlot").innerHTML = ratio >= 0.6 ? ILLUSTRATIONS.resultHappy : ILLUSTRATIONS.resultEncourage;

    goToPage("result");
  }

  
  applyLanguage(state.lang);
  goToPage("home");

})();

</script>
</body>
